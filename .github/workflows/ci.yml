name: Frontend CI/CD

on:
  pull_request:
  push:
    branches:
      - main
      - develop
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  NODE_VERSION: "20"

permissions:
  contents: read

concurrency:
  group: frontend-cicd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality, Security and Build Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type checking
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Coverage tests and quality gate
        run: npm run test:coverage

      - name: Build validation
        run: npm run build

      - name: Audit dependencies (high and critical)
        run: npm run security:audit

      - name: Create build artifact
        run: |
          tar -czf frontend-build-${{ github.sha }}.tar.gz .next public package.json next.config.js

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-${{ github.sha }}
          path: frontend-build-${{ github.sha }}.tar.gz
          retention-days: 14

  deploy-development:
    name: Deploy Development
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    environment:
      name: development
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Simulated deployment (development)
        run: ./scripts/deploy.sh development

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    environment:
      name: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Simulated deployment (staging)
        run: ./scripts/deploy.sh staging

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Simulated deployment (production)
        run: ./scripts/deploy.sh production
